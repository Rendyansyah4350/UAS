<ion-content>
  <div class="verify-header-section">
    <div class="icon-container">
      <ion-icon name="mail-open-outline"></ion-icon>
    </div>
    <div class="brand-name">Verifikasi Akun</div>
    <p class="brand-subtitle">Verify the code from your inbox</p>
  </div>

  <div class="form-card">
    <h2>Verify OTP</h2>
    <p class="instruction-text">
      Enter the 6-digit code sent to <br>
      <span>{{ emailForVerify || 'email anda' }}</span>
    </p>

    <span class="input-label">OTP Code</span>
    <ion-item lines="none" class="otp-input-box">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input 
        type="number" 
        placeholder="000000" 
        maxlength="6" 
        [(ngModel)]="otpCode">
      </ion-input>
    </ion-item>

    <ion-button expand="block" class="verify-btn" (click)="onVerifyOTP()">
      VERIFY CODE
    </ion-button>

    <div class="footer-links">
      <p>Didn't get code? <span class="link-bold" (click)="resendCode()">Resend Code</span></p>
      <p class="margin-top-link">Remember password? <span class="link-bold" (click)="kembali()">Back to Sign In</span></p>
    </div>
  </div>
</ion-content>
