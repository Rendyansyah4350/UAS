<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/course"></ion-back-button>
    </ion-buttons>
    <ion-title>Detail Kursus</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <img [src]="course.image_url || 'assets/images/placeholder.jpg'" />

  <h2 class="course-title">{{ course.title }}</h2> 
  
  <p class="instructor">Oleh: {{ course.instructor_name || 'Admin' }}</p>

  <div class="info-grid">
    <div class="info-item">
      <span>Level</span>
      <strong>{{ course.level }}</strong>
    </div>
    <div class="info-item">
      <span>Durasi</span>
      <strong>{{ course.duration }} Jam</strong>
    </div>
  </div>

  <div class="description">
    <h3>Deskripsi</h3>
    <p>{{ course.description }}</p>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar>
    <div class="footer-flex">
      <div class="price-section">
        <p>Harga</p>
        <h2 color="primary">Rp {{ course.price | number }}</h2>
      </div>
      <ion-button expand="block" shape="round" (click)="enroll()">
        ENROLL SEKARANG
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
