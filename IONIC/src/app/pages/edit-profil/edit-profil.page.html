<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profil" text="" color="dark"></ion-back-button>
    </ion-buttons>
    <ion-title>Ubah Profil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="edit-profile-container">
    <div class="form-container">
      
      <div class="input-group">
        <label>Nama Lengkap</label>
        <ion-item lines="none" class="custom-input-item">
          <ion-input type="text" [(ngModel)]="formData.name" placeholder="Masukkan nama lengkap"></ion-input>
        </ion-item>
      </div>

    </div>

    <div class="action-container">
      <ion-button expand="block" class="btn-simpan" (click)="simpanPerubahan()">
        SIMPAN PERUBAHAN
      </ion-button>
    </div>
  </div>
</ion-content>
