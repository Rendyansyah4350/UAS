<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profil" color="dark" text=""></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: 800; color: #1e293b;">Ubah Profil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="edit-avatar-section">
    <div class="avatar-wrapper">
      <img src="https://i.pravatar.cc/150?u=user" />
      <div class="change-photo">
        <ion-icon name="camera-outline"></ion-icon>
      </div>
    </div>
    <p>Ketuk untuk ganti foto</p>
  </div>

  <div class="form-container">
    <ion-item lines="none" class="input-item">
      <ion-label position="stacked">Nama Lengkap</ion-label>
      <ion-input type="text" value="Nama Lengkap Anda"></ion-input>
    </ion-item>

    <ion-item lines="none" class="input-item">
      <ion-label position="stacked">Email</ion-label>
      <ion-input type="email" value="user@universitas.ac.id"></ion-input>
    </ion-item>

    <ion-item lines="none" class="input-item">
      <ion-label position="stacked">Universitas / Instansi</ion-label>
      <ion-input type="text" value="Mahasiswa Universitas"></ion-input>
    </ion-item>
  </div>

  <ion-button expand="block" class="save-btn">
    SIMPAN PERUBAHAN
  </ion-button>
</ion-content>
