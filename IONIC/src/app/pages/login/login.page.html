<ion-content class="login-container" [fullscreen]="true">
  <!-- Latar Belakang Estetik (Blob) -->
  <div class="blob-bg"></div>
  <div class="blob-bg-secondary"></div>
  
  <!-- Bagian Dekorasi Atas & Logo -->
  <div class="top-decoration">
    <div class="logo-wrapper">
      <div class="logo-circle">
        <!-- Menggunakan ikon roket permanen karena halaman ini murni untuk login -->
        <ion-icon name="rocket-sharp"></ion-icon>
      </div>
      <div class="logo-ring"></div>
    </div>
    
    <div class="header-text">
      <h1>Eduvan</h1>
      <div class="premium-badge">
        <span>LEARNING COURSE MARKETPLACE</span>
      </div>
    </div>
  </div>

  <!-- Kartu Login -->
  <div class="login-card edu-card">
    <div class="fade-in">
      <h2>SELAMAT DATANG!</h2>
      <span class="subtitle">Enter your credentials to continue learning</span>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <!-- Input Email -->
        <div class="input-group">
          <ion-label class="input-label">Email Address</ion-label>
          <ion-item lines="none" class="input-item edu-input-item">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input type="email" formControlName="email" placeholder="example@gmail.com"></ion-input>
          </ion-item>
        </div>

        <!-- Input Password -->
        <div class="input-group">
          <ion-label class="input-label">Password</ion-label>
          <ion-item lines="none" class="input-item edu-input-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <!-- Mengubah type secara dinamis untuk fitur show/hide password -->
            <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"></ion-input>
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="end" (click)="togglePassword()" class="toggle-eye"></ion-icon>
          </ion-item>

          <div class="forgot-link-container">
            <span (click)="goToForgotPassword()">Forgot Password?</span>
          </div>
        </div>

        <!-- Tombol Sign In (Aktif hanya jika form valid) -->
        <ion-button expand="block" type="submit" class="btn-primary main-btn" [disabled]="!loginForm.valid">
          Sign In
        </ion-button>
      </form>

      <!-- Navigasi ke Register -->
      <div class="footer-action">
        Don't have an account? <strong (click)="goToRegister()">Join for Free</strong>
      </div>
    </div>
  </div>
</ion-content>
