<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Login Eduvan</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="register-container">
    <div class="header ion-margin-bottom">
      <h2>Buat Akun Baru</h2>
      <p>Bergabunglah dengan ribuan siswa lainnya</p>
    </div>

<!-- Masukkan ini di dalam <div class="login-container"> -->
<form [formGroup]="loginForm">
  
  <ion-item lines="full" class="ion-margin-bottom">
    <ion-label position="stacked">Email</ion-label>
    <ion-input type="email" formControlName="email" placeholder="email@contoh.com"></ion-input>
  </ion-item>

  <ion-item lines="full" class="ion-margin-bottom">
    <ion-label position="stacked">Password</ion-label>
    <!-- Tipe input berubah dinamis berdasarkan variabel showPassword -->
    <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="******"></ion-input>
    
    <!-- Ikon Toggle -->
    <ion-icon 
      slot="end" 
      [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" 
      class="ion-align-self-end ion-margin-bottom"
      (click)="togglePassword()" 
      style="cursor: pointer;">
    </ion-icon>
  </ion-item>

  <ion-button expand="block" shape="round" color="primary" class="ion-margin-top" (click)="onLogin()">
    Login
  </ion-button>

</form>

    <div class="footer ion-text-center ion-margin-top">
      <p>Belum punya akun? <a routerLink="/register">Daftar sekarang</a></p>
    </div>
  </div>
</ion-content>
