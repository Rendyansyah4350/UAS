<ion-content class="login-container" [fullscreen]="true">
  <div class="top-decoration">
    <div class="logo-circle">
      <ion-icon name="rocket-sharp"></ion-icon>
    </div>
    <h1>Eduvan</h1>
    <p>Premium Learning Marketplace</p>
  </div>

  <div class="login-card">
    <h2>Welcome Back!</h2>
    <span class="subtitle">Enter your credentials to continue learning</span>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <!-- Email Group -->
      <div class="input-group">
        <ion-label class="input-label">Email Address</ion-label>
        <ion-item lines="none" class="input-item">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" formControlName="email" placeholder="example@gmail.com"></ion-input>
        </ion-item>
      </div>

      <!-- Password Group -->
      <div class="input-group">
        <ion-label class="input-label">Password</ion-label>
        <ion-item lines="none" class="input-item">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"></ion-input>
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" 
                    slot="end" 
                    (click)="togglePassword()" 
                    style="cursor: pointer;"></ion-icon>
        </ion-item>
        
        <!-- Link Forgot Password diletakkan di dalam input-group password agar rapi -->
        <div class="forgot-link-container" style="display: flex; justify-content: flex-end; margin-top: 5px;">
          <span (click)="goToForgotPassword()" style="color: var(--ion-color-primary); font-size: 0.8rem; cursor: pointer;">
            Forgot Password?
          </span>
        </div>
      </div>

      <ion-button expand="block" type="submit" class="btn-primary" [disabled]="!loginForm.valid">
        Sign In
      </ion-button>
    </form>

    <div class="footer-action">
      Don't have an account? 
      <strong (click)="goToRegister()">Join for Free</strong>
    </div>
  </div>
</ion-content>
