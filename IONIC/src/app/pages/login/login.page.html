<ion-content>
  <div class="auth-header-section">
    <div class="icon-container">
      <ion-icon name="rocket-outline"></ion-icon>
    </div>
    <div class="brand-name">Eduvan</div>
    <div class="badge-subtitle">LEARNING COURSE MARKETPLACE</div>
  </div>

  <div class="form-card" [formGroup]="loginForm">
    <h2>SELAMAT DATANG!</h2>
    <p class="instruction-text">Enter your credentials to continue learning</p>

    <span class="input-label">EMAIL ADDRESS</span>
    <ion-item lines="none" class="auth-input-box">
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      <ion-input type="email" placeholder="nama@email.com" formControlName="email"></ion-input>
    </ion-item>
    <p class="error-msg" *ngif="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
      Masukkan alamat email yang valid
    </p>

    <span class="input-label">PASSWORD</span>
    <ion-item lines="none" class="auth-input-box">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" formControlName="password"></ion-input>
      <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="eye-icon" (click)="togglePassword()"></ion-icon>
    </ion-item>
    <p class="error-msg" *ngif="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
      Password wajib diisi (minimal 8 karakter)
    </p>

    <div class="forgot-password-link">
      <span (click)="goToForgotPassword()">Forgot Password?</span>
    </div>

    <ion-button expand="block" class="auth-btn" (click)="onLogin()">
      SIGN IN
    </ion-button>

    <div class="footer-links">
      Don't have an account? <span class="link-bold" (click)="goToRegister()">Join for Free</span>
    </div>
  </div>
</ion-content>
