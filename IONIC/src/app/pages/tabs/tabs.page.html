<ion-tabs>

  <ion-tab-bar slot="bottom" mode="ios">
    <!-- Menu Beranda -->
    <ion-tab-button tab="beranda">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Beranda</ion-label>
    </ion-tab-button>

    <!-- Menu My Learning (Kursus yang sedang diikuti) -->
    <ion-tab-button tab="my-learning">
      <ion-icon name="play-circle-outline"></ion-icon>
      <ion-label>My Learning</ion-label>
    </ion-tab-button>

    <!-- Menu Wishlist (Kursus yang disimpan) -->
    <ion-tab-button tab="wishlist">
      <ion-icon name="heart-outline"></ion-icon>
      <ion-label>Wishlist</ion-label>
    </ion-tab-button>

    <!-- Menu Profil -->
    <ion-tab-button tab="profil">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Profil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
