<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profil" color="dark" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Notifikasi</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list lines="full">
    <ion-item class="notif-item">
      <div class="icon-circle blue" slot="start">
        <ion-icon name="megaphone-outline"></ion-icon>
      </div>
      <ion-label>
        <h3>Promo Ramadhan!</h3>
        <p>Diskon 50% untuk kursus UI/UX Design khusus minggu ini.</p>
        <span class="time">2 jam yang lalu</span>
      </ion-label>
    </ion-item>

    <ion-item class="notif-item">
      <div class="icon-circle green" slot="start">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
      </div>
      <ion-label>
        <h3>Pembayaran Berhasil</h3>
        <p>Kursus "Coding Hero" Anda sudah bisa diakses sekarang.</p>
        <span class="time">1 hari yang lalu</span>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
