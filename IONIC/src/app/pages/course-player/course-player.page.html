<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/course"></ion-back-button>
    </ion-buttons>
    <ion-title>Belajar Sekarang</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="video-wrapper">
    <video controls [src]="materiAktif?.video_url" class="player">
      Browser kamu tidak mendukung video.
    </video>
  </div>

  <div class="content-container">
    <h2 class="lesson-title">{{ materiAktif?.judul || 'Pilih Materi' }}</h2>
    
    <div class="curriculum-section">
      <h4 class="section-header">Daftar Materi</h4>
      
      <ion-list lines="none" class="materi-list">
        <ion-item button *ngFor="let m of daftarMateri" (click)="pilihMateri(m)" [class.active]="m.id === materiAktif?.id">
          <ion-icon [name]="m.id === materiAktif?.id ? 'play-circle' : 'play-outline'" slot="start"></ion-icon>
          <ion-label>
            <h3>{{ m.judul }}</h3>
            <p>{{ m.durasi }}</p>
          </ion-label>
          <ion-checkbox slot="end" [checked]="m.is_completed"></ion-checkbox>
        </ion-item>
      </ion-list>
    </div>
  </div>
</ion-content>
