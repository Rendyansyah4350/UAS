<ion-header mode="ios" class="ion-no-border">
  <div class="header-navy">
    <ion-title>Kuis Kursus</ion-title>
  </div>
</ion-header>

<ion-content class="ion-padding">
  <div class="quiz-progress" *ngIf="!isFinished">
    <p>Soal {{ currentQuestionIndex + 1 }} dari {{ questions.length }}</p>
    <ion-progress-bar [value]="(currentQuestionIndex + 1) / questions.length" mode="ios"></ion-progress-bar>
  </div>

  <div class="question-card" *ngIf="!isFinished && currentQuestionIndex < questions.length">
    <h3>{{ questions[currentQuestionIndex].question }}</h3>
  </div>

  <ion-radio-group (ionChange)="selectAnswer($event.detail.value)" *ngIf="!isFinished && currentQuestionIndex < questions.length">
    <ion-item *ngFor="let option of questions[currentQuestionIndex].options" class="option-item" lines="none">
      <ion-radio slot="start" [value]="option"></ion-radio>
      <ion-label>{{ option }}</ion-label>
    </ion-item>
  </ion-radio-group>

  <div *ngIf="isFinished" class="result-container ion-text-center">
    <div class="result-card">
      <h2>Kuis Selesai!</h2>
      <p>Skor Akhir Anda</p>
      <h1 class="score-display">{{ score }}</h1>
      <ion-button expand="block" shape="round" (click)="finishQuiz()" class="finish-btn">
        Kembali ke Kursus
      </ion-button>
    </div>
  </div>
</ion-content>
