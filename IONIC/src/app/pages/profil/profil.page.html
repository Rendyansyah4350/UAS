<ion-content>
  <div class="header-container">
    <div class="avatar-section">
      <div class="image-wrapper">
        <img [src]="userProfile?.name ? 'https://ui-avatars.com/api/?name=' + userProfile.name + '&background=ffffff&color=1560bd' : 'https://ui-avatars.com/api/?name=User&background=ffffff&color=1560bd'" />
        <div class="camera-badge">
          <ion-icon name="camera"></ion-icon>
        </div>
      </div>
    </div>

    <div class="user-details">
      <h2>{{ userProfile?.name ?? 'Memuat Nama...' }}</h2>
      <p>Mahasiswa Universitas</p>
    </div>

    <div class="stat-grid">
      <div class="stat-item">
        <h3>{{ userProfile?.total_courses ?? 0 }}</h3>
        <span>Kursus</span>
      </div>
      <div class="stat-divider"></div>
      
      <div class="stat-item" (click)="goToCertificate()" style="cursor: pointer;">
        <h3>{{ userProfile?.total_certificates ?? 0 }}</h3>
        <span style="color: #1560bd; font-weight: bold;">Sertifikat</span>
      </div>
    </div>
  </div>

  <div class="menu-section">
    <ion-list lines="none">
      <ion-item button (click)="goToEdit()">
        <div class="icon-box blue" slot="start">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <ion-label>Edit Profil</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="arrow"></ion-icon>
      </ion-item>

      <ion-item button (click)="goToCertificate()">
        <div class="icon-box orange" slot="start" style="background: #fff7ed; color: #ea580c;">
          <ion-icon name="ribbon-outline"></ion-icon>
        </div>
        <ion-label>Sertifikat Saya</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="arrow"></ion-icon>
      </ion-item>

      <ion-item button (click)="goToHistory()">
        <div class="icon-box green" slot="start">
          <ion-icon name="receipt-outline"></ion-icon>
        </div>
        <ion-label>Riwayat Transaksi</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="arrow"></ion-icon>
      </ion-item>

      <ion-item button (click)="goToNotif()">
        <div class="icon-box orange" slot="start">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <ion-label>Notifikasi</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="arrow"></ion-icon>
      </ion-item>

      <ion-item button (click)="logout()" class="logout-item">
        <div class="icon-box red" slot="start">
          <ion-icon name="log-out-outline"></ion-icon>
        </div>
        <ion-label color="danger">Keluar</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="arrow"></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
