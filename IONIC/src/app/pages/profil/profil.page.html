<ion-content>
  <div class="profile-header">
    <div class="avatar-container">
      <div class="avatar-wrapper">
        <img src="https://i.pravatar.cc/150?u=user" />
        <div class="camera-badge">
          <ion-icon name="camera"></ion-icon>
        </div>
      </div>
    </div>
    
    <div class="user-info">
      <h1>Nama Lengkap Anda</h1>
      <p>Mahasiswa Universitas</p>
    </div>

    <div class="stats-container">
      <div class="stat-box">
        <h3>12</h3>
        <span>Kursus</span>
      </div>
      <div class="divider"></div>
      <div class="stat-box">
        <h3>5</h3>
        <span>Sertifikat</span>
      </div>
    </div>
  </div>

  <div class="menu-container">
    <div class="menu-card">
      <ion-item lines="full" detail="true" class="menu-item" (click)="goToEdit()">
        <div class="icon-box blue" slot="start">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <ion-label>Edit Profil</ion-label>
      </ion-item>

      <ion-item lines="full" detail="true" class="menu-item" (click)="goToSecurity()">
        <div class="icon-box green" slot="start">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <ion-label>Keamanan Akun</ion-label>
      </ion-item>

      <ion-item lines="full" detail="true" class="menu-item" (click)="goToNotif()">
        <div class="icon-box orange" slot="start">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <ion-label>Notifikasi</ion-label>
      </ion-item>

      <ion-item lines="none" detail="true" class="menu-item logout" (click)="logout()">
        <div class="icon-box red" slot="start">
          <ion-icon name="log-out-outline"></ion-icon>
        </div>
        <ion-label>Keluar</ion-label>
      </ion-item>
    </div>
  </div>
</ion-content>
