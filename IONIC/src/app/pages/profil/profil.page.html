<ion-header class="ion-no-border">
  <ion-toolbar mode="ios" style="--background: #6c5ce7; --color: white;">
    <ion-title>Profil</ion-title>
    <ion-buttons slot="end">
      <ion-button color="light">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="profile-purple-header">
    <div class="avatar-box">
      <img src="assets/imgs/user-photo.jpg" onerror="this.src='https://via.placeholder.com/150'" />
      <div class="edit-badge"><ion-icon name="pencil"></ion-icon></div>
    </div>
    <h2>Hallo, Andi</h2>
    <p>andi@email.com</p>
  </div>

  <ion-list lines="none" style="background: transparent; margin-top: 10px;">
    <ion-item button mode="ios" class="menu-item">
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-label>Profil Saya</ion-label>
      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>
    
    <ion-item button mode="ios" class="menu-item">
      <ion-icon name="receipt-outline" slot="start"></ion-icon>
      <ion-label>Riwayat Transaksi</ion-label>
      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>

    <ion-item button mode="ios" class="menu-item">
      <ion-icon name="card-outline" slot="start"></ion-icon>
      <ion-label>Metode Pembayaran</ion-label>
      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>

    <ion-item button mode="ios" class="menu-item">
      <ion-icon name="help-circle-outline" slot="start"></ion-icon>
      <ion-label>Bantuan & Dukungan</ion-label>
      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>

    <ion-item button mode="ios" class="menu-item" style="--color: #ff7675;">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      <ion-label>Keluar</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
