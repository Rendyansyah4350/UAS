<ion-content class="ion-padding">
  <div class="learning-tabs-container">
    <div class="tab-pill" [class.active]="activeTab === 'ongoing'" (click)="switchTab('ongoing')">
      Kursus Saya
    </div>
    <div class="tab-pill" [class.active]="activeTab === 'completed'" (click)="switchTab('completed')">
      Selesai
    </div>
  </div>

  <div *ngFor="let item of filteredEnrollments" class="course-card">
    <div class="card-header">
      <img [src]="item.course?.image || 'assets/imgs/default.jpg'" class="course-img" />
      <div class="course-info">
        <h3>{{ item.course?.title }}</h3>
        <p>{{ item.progress }}% Selesai</p>
      </div>
    </div>
    
    <div class="card-actions">
      <ion-button expand="block" (click)="goToPlayer(item.course_id)" class="btn-main">
        LANJUT BELAJAR
      </ion-button>
      
      <ion-button expand="block" color="warning" (click)="openQuiz(item)" class="btn-quiz">
        KUIS
      </ion-button>
    </div>
  </div>
</ion-content>
