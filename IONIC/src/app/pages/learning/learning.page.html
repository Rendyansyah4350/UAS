<ion-content [fullscreen]="true">
  <div class="main-wrapper">
    
    <!-- Header Halaman -->
    <div class="header-area">
      <h2>My Learning</h2>
      <ion-icon name="notifications-outline" class="notif-btn"></ion-icon>
    </div>

    <!-- Tab Filter Internal -->
    <div class="learning-tabs">
      <div class="tab-item active">Kursus Saya</div>
      <div class="tab-item">Selesai</div>
    </div>

    <!-- Daftar Kursus -->
    <div class="learning-list">
      
      <!-- Card Kursus 1 -->
      <div class="learning-card">
        <div class="card-content-row">
          <div class="thumbnail">
            <img src="assets/imgs/uiux-thumb.jpg" />
          </div>
          <div class="info">
            <h5>UI/UX Design from Zero to Hero</h5>
            <p class="stats">65% Selesai</p>
            <!-- Progress Bar -->
            <div class="progress-container">
              <div class="progress-fill" style="width: 65%;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Card Kursus 2 -->
      <div class="learning-card">
        <div class="card-content-row">
          <div class="thumbnail">
            <img src="assets/imgs/coding-thumb.jpg" />
          </div>
          <div class="info">
            <h5>Complete Web Developer Bootcamp 2024</h5>
            <p class="stats">30% Selesai</p>
            <div class="progress-container">
              <div class="progress-fill" style="width: 30%;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
