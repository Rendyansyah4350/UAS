<ion-content [fullscreen]="true">
  <div class="main-wrapper">
    
    <div class="header-area">
      <h2>Wishlist</h2>
      <div class="count-badge">3 Kursus</div>
    </div>

    <div class="wishlist-container">
      
      <!-- Item Wishlist 1 -->
      <div class="wishlist-card">
        <div class="thumb-section">
          <img src="assets/imgs/course-1.jpg" />
          <div class="wish-icon">
            <ion-icon name="heart"></ion-icon>
          </div>
        </div>
        
        <div class="info-section">
          <h5>Advanced Flutter Mastery 2024</h5>
          <div class="meta-row">
            <ion-icon name="star"></ion-icon>
            <span>4.9</span>
            <span class="reviews">(2.1k)</span>
          </div>
          <div class="price-row">
            <span class="current-price">Rp 350.000</span>
            <ion-icon name="cart-outline" class="add-cart"></ion-icon>
          </div>
        </div>
      </div>

      <!-- Item Wishlist 2 -->
      <div class="wishlist-card">
        <div class="thumb-section">
          <img src="assets/imgs/course-2.jpg" />
          <div class="wish-icon">
            <ion-icon name="heart"></ion-icon>
          </div>
        </div>
        
        <div class="info-section">
          <h5>Business Intelligence with Power BI</h5>
          <div class="meta-row">
            <ion-icon name="star"></ion-icon>
            <span>4.7</span>
            <span class="reviews">(850)</span>
          </div>
          <div class="price-row">
            <span class="current-price">Rp 275.000</span>
            <ion-icon name="cart-outline" class="add-cart"></ion-icon>
          </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
