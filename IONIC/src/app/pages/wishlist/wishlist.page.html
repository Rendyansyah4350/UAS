<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-title>Wishlist</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content>

        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3 class="course-title">Mobile App Development with Flutter</h3>
          <ion-icon name="heart" style="color: #ff7675; font-size: 22px;"></ion-icon>
        </div>
        <p class="instructor">Siti Rahma</p>
        <div class="price-row">
          <span class="price">Rp 399.000</span>
        </div>
      </div>
    </div>
  </div>

  <div class="wish-card">
    <div class="card-content">
      <img src="assets/imgs/course-ds.jpg" class="card-img" />

        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3 class="course-title">Data Science for Beginners</h3>
          <ion-icon name="heart" style="color: #ff7675; font-size: 22px;"></ion-icon>
        </div>
        <p class="instructor">Rudi Hermawan</p>
