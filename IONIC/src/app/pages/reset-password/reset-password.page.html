<ion-content class="login-container" [fullscreen]="true">
  <div class="top-decoration">
    <div class="logo-circle">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
    </div>
    <h1>New Password</h1>
    <p>Create a strong new password</p>
  </div>

  <div class="login-card edu-card">
    <div>
      <h2>Create New Password</h2>
      <span class="subtitle">Your new password must be different from previous ones</span>

      <div class="input-group">
        <ion-label class="input-label">New Password</ion-label>
        <ion-item lines="none" class="input-item edu-input-item">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword" placeholder="••••••••"></ion-input>
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="end" (click)="showPassword = !showPassword" style="cursor: pointer;"></ion-icon>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Confirm Password</ion-label>
        <ion-item lines="none" class="input-item edu-input-item">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" placeholder="••••••••"></ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" (click)="updatePassword()" class="btn-primary" [disabled]="!newPassword || newPassword !== confirmPassword">
        Update Password
      </ion-button>
    </div>
  </div>
</ion-content>
