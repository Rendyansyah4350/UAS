<ion-content>
  <div class="auth-header-section">
    <div class="icon-container">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
    </div>
    <div class="brand-name">Password Baru</div>
    <p class="brand-subtitle">Buat Password baru yang kuat untuk keamanan</p>
  </div>

  <div class="form-card">
    <h2>Buat Password Baru</h2>
    <p class="instruction-text">Password harus berbeda dengan Password sebelumnya</p>

    <span class="input-label">PASSWORD BARU</span>
    <ion-item lines="none" class="auth-input-box">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="newPassword"></ion-input>
      <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="eye-icon" (click)="showPassword = !showPassword"></ion-icon>
    </ion-item>

    <span class="input-label">KONFRIMASI PASSWORD</span>
    <ion-item lines="none" class="auth-input-box">
      <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
      <ion-input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="confirmPassword"></ion-input>
      <ion-icon [name]="showConfirmPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="eye-icon" (click)="showConfirmPassword = !showConfirmPassword"></ion-icon>
    </ion-item>

    <ion-button expand="block" class="auth-btn" (click)="updatePassword()">
      PERBARUI PASSWORD
    </ion-button>
  </div>
</ion-content>
