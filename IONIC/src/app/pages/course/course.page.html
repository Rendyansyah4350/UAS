<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Katalog Kursus</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar 
      placeholder="Cari kursus favoritmu..." 
      class="custom-search">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="category-section">
    <h3 class="section-title">Kategori Populer</h3>
    <div class="scroll-x">
      <ion-chip outline="true" color="primary">
        <ion-icon name="code-working-outline"></ion-icon> 
        <ion-label>Programming</ion-label>
      </ion-chip>
      <ion-chip outline="true" color="primary">
        <ion-icon name="color-palette-outline"></ion-icon> 
        <ion-label>UI/UX</ion-label>
      </ion-chip>
      <ion-chip outline="true" color="primary">
        <ion-icon name="megaphone-outline"></ion-icon> 
        <ion-label>Marketing</ion-label>
      </ion-chip>
    </div>
  </div>

  <h3 class="section-title">Semua Kursus</h3>
  
<ion-grid class="ion-no-padding">
  <ion-row>
    <ion-col size="6" class="ion-no-padding" *ngFor="let c of listCourses">
      <ion-card class="product-card" (click)="goToDetail(c.id)">
        <div class="image-container">
          <img [src]="c.image_url || 'assets/images/placeholder.jpg'" />
          <div class="badge-new" *ngIf="c.is_new">New</div>
        </div>
        <div class="card-content">
          <p class="course-title">{{ c.title }}</p>
          <div class="rating-row">
            <ion-icon name="star" class="star-icon"></ion-icon>
            <span>{{ c.rating }} | {{ c.enrolled }} terjual</span>
          </div>
          <p class="price">{{ c.price | currency:'IDR':'symbol':'1.0-0' }}</p>
          <div class="footer-row">
            <ion-icon name="location-outline"></ion-icon>
            <span>{{ c.type }}</span>
          </div>
        </div>
      </ion-card>
    </ion-col>
  </ion-row>
</ion-grid>
</ion-content>
