<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Katalog Kursus</ion-title>
  </ion-toolbar>
  <div class="search-box">
    <ion-searchbar placeholder="Cari kursus favoritmu..." mode="ios"></ion-searchbar>
  </div>
</ion-header>

<ion-content>
  <div class="section-label">
    <h3>Kategori Populer</h3>
  </div>
  
  <div class="category-scroll">
    <ion-chip class="chip-active"><ion-icon name="code-working"></ion-icon> Programming</ion-chip>
    <ion-chip><ion-icon name="color-palette"></ion-icon> UI/UX</ion-chip>
    <ion-chip><ion-icon name="megaphone"></ion-icon> Marketing</ion-chip>
  </div>

  <div class="section-label">
    <h3>Semua Kursus</h3>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let course of listCourses">
        <ion-card (click)="goToDetail(course.id)">
          <div class="img-container">
            <img [src]="course.image ? course.image : 'https://via.placeholder.com/150'" />
          </div>
          <div class="card-content">
            <span class="category-tag">{{ course.category ?? 'General' }}</span>
            
            <ion-card-title>{{ course.title }}</ion-card-title>
            
            <div class="rating">
              <ion-icon name="star" color="warning"></ion-icon>
              <span>{{ course.rating ? (course.rating | number:'1.1-1') : '0.0' }} | Terjual 100+</span>
            </div>
            
            <h2 class="price">IDR {{ course.price | number }}</h2>
          </div>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
