<ion-content class="login-container" [fullscreen]="true">
  <div class="top-decoration">
    <div class="logo-circle">
      <ion-icon name="key-outline"></ion-icon>
    </div>
    <h1>Reset Password</h1>
    <p>We will send an OTP code to your Gmail</p>
  </div>

  <div class="login-card">
    <h2>Forgot Password?</h2>
    <span class="subtitle">Enter your email address to recover your account</span>

    <div class="input-group">
      <ion-label class="input-label">Email Address</ion-label>
      <ion-item lines="none" class="input-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" [(ngModel)]="email" placeholder="yourname@gmail.com"></ion-input>
      </ion-item>
    </div>

    <ion-button expand="block" (click)="sendOtp()" class="btn-primary">
      Send OTP Code
    </ion-button>

    <div class="footer-action">
      Remember password? 
      <strong (click)="goToLogin()">Back to Sign In</strong>
    </div>
  </div>
</ion-content>
